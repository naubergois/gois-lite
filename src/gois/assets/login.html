<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<title>gois — login</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --panel-2: #1e222c; --border: #262b36;
    --fg: #e6e8ee; --muted: #8a93a6; --bad: #ff5a5f; --accent: #6aa9ff;
    --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--fg);
               font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  main { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .login-card { width: min(400px, 100%); background: var(--panel); border: 1px solid var(--border);
                border-radius: 12px; padding: 28px 24px; }
  .login-brand { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .login-brand svg { width: 48px; height: 48px; flex-shrink: 0; }
  .login-brand h1 { margin: 0; font-size: 20px; }
  .login-brand p { margin: 4px 0 0; color: var(--muted); font-size: 12px; }
  label { display: block; margin-bottom: 12px; font-size: 12px; color: var(--muted); }
  input { width: 100%; margin-top: 6px; padding: 10px 12px; border-radius: 8px;
          border: 1px solid var(--border); background: var(--panel-2); color: var(--fg); font: inherit; }
  input:focus { outline: none; border-color: var(--accent); }
  button { width: 100%; margin-top: 8px; padding: 12px; border: 0; border-radius: 8px;
           background: var(--accent); color: #0f1115; font-weight: 600; cursor: pointer; }
  button:hover { filter: brightness(1.05); }
  button[disabled] { opacity: .6; cursor: progress; }
  .msg { margin-top: 12px; font-size: 12px; font-family: var(--mono); color: var(--muted); min-height: 1.2em; }
  .msg.err { color: var(--bad); }
</style>
</head>
<body>
<main>
  <div class="login-card">
    <div class="login-brand">
      __GOIS_MASCOT_INLINE__
      <div>
        <h1>gois</h1>
        <p>Generative Orchestration Artificial Intelligence Swarm</p>
      </div>
    </div>
    <form id="login-form">
      <label>Usuário
        <input type="text" name="username" id="login-user" autocomplete="username" required>
      </label>
      <label>Senha
        <input type="password" name="password" id="login-pass" autocomplete="current-password" required>
      </label>
      <button type="submit" id="login-btn">Entrar</button>
      <div class="msg" id="login-msg"></div>
    </form>
    <form id="register-form" hidden style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border);">
      <p style="margin:0 0 12px;font-size:13px;color:var(--muted);">Criar nova conta</p>
      <label>Usuário
        <input type="text" id="reg-user" autocomplete="username" required>
      </label>
      <label>Senha (mín. 6 caracteres)
        <input type="password" id="reg-pass" autocomplete="new-password" required>
      </label>
      <button type="submit" id="register-btn">Cadastrar</button>
      <div class="msg" id="register-msg"></div>
    </form>
    <p id="register-toggle-wrap" hidden style="margin-top:14px;text-align:center;font-size:13px;">
      <button type="button" id="register-toggle" style="background:none;border:0;color:var(--accent);cursor:pointer;font:inherit;">
        Criar conta
      </button>
    </p>
  </div>
</main>
<script>
(function () {
  // Cookie qcm_session é por host — alinhar com o redirect GET localhost→127.0.0.1.
  if (window.location.hostname === "localhost") {
    const url = new URL(window.location.href);
    url.hostname = "127.0.0.1";
    window.location.replace(url.toString());
    return;
  }
  const params = new URLSearchParams(window.location.search);
  const next = params.get("next") || "/";
  const form = document.getElementById("login-form");
  const msg = document.getElementById("login-msg");
  const btn = document.getElementById("login-btn");
  const regForm = document.getElementById("register-form");
  const regToggleWrap = document.getElementById("register-toggle-wrap");
  const regToggle = document.getElementById("register-toggle");
  const regMsg = document.getElementById("register-msg");
  const regBtn = document.getElementById("register-btn");

  fetch("/auth/bootstrap", { cache: "no-cache" })
    .then((r) => r.json())
    .then((data) => {
      if (data && data.enabled === false) {
        window.location.replace(next);
        return;
      }
      if (data && data.allow_open_registration) {
        regToggleWrap.hidden = false;
      }
    })
    .catch(() => {});

  regToggle.addEventListener("click", () => {
    const show = regForm.hidden;
    regForm.hidden = !show;
    regToggle.textContent = show ? "Já tenho conta" : "Criar conta";
    if (show) document.getElementById("reg-user").focus();
  });

  regForm.addEventListener("submit", async (ev) => {
    ev.preventDefault();
    regBtn.disabled = true;
    regMsg.className = "msg";
    regMsg.textContent = "Cadastrando…";
    try {
      const r = await fetch("/auth/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          username: document.getElementById("reg-user").value.trim(),
          password: document.getElementById("reg-pass").value,
        }),
      });
      const data = await r.json();
      if (!r.ok || data.ok === false) throw new Error(data.error || ("HTTP " + r.status));
      window.location.replace(next);
    } catch (e) {
      regMsg.className = "msg err";
      regMsg.textContent = e.message || "Falha no cadastro";
      regBtn.disabled = false;
    }
  });
  form.addEventListener("submit", async (ev) => {
    ev.preventDefault();
    btn.disabled = true;
    msg.className = "msg";
    msg.textContent = "Entrando…";
    try {
      const r = await fetch("/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          username: document.getElementById("login-user").value.trim(),
          password: document.getElementById("login-pass").value.trim(),
        }),
      });
      const data = await r.json();
      if (!r.ok || data.ok === false) throw new Error(data.error || ("HTTP " + r.status));
      window.location.replace(next);
    } catch (e) {
      msg.className = "msg err";
      msg.textContent = e.message || "Falha no login";
      btn.disabled = false;
    }
  });
})();
</script>
</body>
</html>
